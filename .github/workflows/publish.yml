name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Bootstrap publish step (token-based) — runs until the package exists on
# npm and a Trusted Publisher is configured at
# https://www.npmjs.com/package/@particle-academy/fancy-slides/access
# After that, swap NODE_AUTH_TOKEN for `id-token: write` + OIDC.
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx -y npm@latest publish --provenance --access public
