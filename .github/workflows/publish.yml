name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# OIDC / npm Trusted Publishing. The Particle-Academy/fancy-slides
# Trusted Publisher is configured at
# https://www.npmjs.com/package/@particle-academy/fancy-slides/access
# so this workflow needs no NPM_TOKEN — npm exchanges the GitHub OIDC
# token for a short-lived publish credential.
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        # `npm install` (not `npm ci`) — this repo lives under the fancy-ui
        # workspace, so the lockfile is at the workspace root, not here.
        # `--legacy-peer-deps` because @particle-academy/fancy-code@0.4.x
        # peers on react-fancy@^2.0.0 while we depend on react-fancy@^3.0.0.
        # The actual import surface is unaffected; this is just npm being strict.
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Publish
        # OIDC publish — needs npm 11.5+, which the runner's bundled npm
        # (10.x) doesn't satisfy. `npx -y npm@latest` fetches a fresh npm
        # for this one command.
        run: npx -y npm@latest publish --provenance --access public
